version: '3'
services:
  #1.Etcd服务
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    container_name: etcd-server
    environment:
      - ETCD_LOG_LEVEL=debug
    # 🔥 关键点：官方镜像必须加这行命令，允许外部连接
    command: 
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
  #2.Master服务
  master:
    build: . #使用当前目录的Dockerfile构建
    container_name: cron-master
    command: ./master-bin #覆盖Dockerfile里的CMD，运行master
    ports:
      - "50012:50012" #把容器的50012映射到电脑的50012
    environment:
      - ETCD_ENDPOINTS=etcd:2379 #关键！告诉它etcd在哪（用服务名etcd）
    depends_on:
      - etcd #等etcd启动了再启动
      

  #3.worker服务（我们这里启动3个节点）
  worker:
    build: .
    command: ./worker-bin #运行worker
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MONGO_URI=mongodb://mongo:27017
      - KAFKA_BROKERS=kafka:9092 #注入kafka地址
    depends_on:
      - etcd
      - mongo
      
      - kafka
    deploy:
      replicas: 3 #启动3个Worker模拟分布式
    #这里的 deploy replicas 是 Docker Swarm 的写法，
    # 在普通 compose 里，我们需要用命令参数 --scale
    # 或者我们简单点，直接复制粘贴定义 worker1, worker2, worker3 也可以
    # 但最标准的做法是用 scale 命令 (下面会教你)

  #4.启动MongoDB服务
  mongo:
    image: mongo:latest
    container_name: cron-mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017
    ports:
      - "27017:27017"

  #5. 启动MySQL服务
  mysql:
    image: mysql:5.7
    container_name: cron-mysql
    platform: linux/amd64 #防止苹果M1/M2兼容性问题
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "cron-demo"
    ports:
      - "3307:3306"
  #6. 启动Mock服务
  mock-services:
    build: .
    container_name: cron-mock
    command: ./mock-bin #运行mock程序
    ports:
      - "8877:8877"
    depends_on:
      - mysql
  #7. Kafka服务（KRaft模式，轻量避免Zookeeper）
  kakfa:
    image: bitnami/kafka:3.6
    container_name: cron-kakfa
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1 #给自己一个唯一的编号，Kafka集群里每个节点要有一个ID
      - KAFKA_CFG_PROCESS_ROLES=controller,broker #这个节点既是controller又是broker，controller负责管理元数据，broker负责收发消息
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093 # 元数据选举集群只有 1 个 controller 节点，就在 kafka:9093。
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 #启动两个监听端口，9092给外部客户端（broker），9093给controller
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 # 告诉Worker连这个地址
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT #每个listener用什么协议
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER #controller必须用名为CONTROLLER的监听器，就是9093端口
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT #broker通过PLAINTEXT（9092）互相通信
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cron-kafka-ui
    ports:
      - "8083:8083" #浏览器访问8083即可看消息
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kraft
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka